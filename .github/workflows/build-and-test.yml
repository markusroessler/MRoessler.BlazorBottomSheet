name: Build and Test

on:
  workflow_call:
    inputs:
      build-config:
        required: true
        type: string

permissions:
  contents: write
  packages: read

env:
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION }}
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  NUGET_MROESSLER_GITHUB_PWD: ${{ secrets.NUGET_READ }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Git
        run: bash .github/scripts/configure-git.sh

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "*/*.csproj"

      - name: Remove setup-dotnet problem matcher
        run: bash .github/scripts/remove-net-problem-matcher.sh
      
      - name: Restore
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore
      
      - name: Build
        id: build
        run: bash .github/scripts/build.sh ${{ inputs.build-config }}

      - name: Collect build results
        id: collect-build-results
        if: always()
        run: bash .github/scripts/collect-build-results.sh ${{ github.server_url }} ${{ github.repository }} ${{ github.ref_name }}

      - name: Publish lines of code
        if: always()
        run: |
          bash .github/scripts/print-lines-of-code.sh >> $GITHUB_STEP_SUMMARY


  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, webkit, firefox]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
        cache-dependency-path: "*/*.csproj"

    - name: Remove setup-dotnet problem matcher
      run: bash .github/scripts/remove-net-problem-matcher.sh

    - name: Install npm packages
      if: inputs.build-config == 'Debug'
      run: npm install -g nyc

    - name: Instrument js files for code coverage
      if: always() && inputs.build-config == 'Debug'
      run: nyc instrument ./MRoessler.BlazorBottomSheet ./MRoessler.BlazorBottomSheet --in-place --compact false

    - name: Restore
      run: dotnet restore

    - name: Restore tools
      run: dotnet tool restore
    
    - name: Build
      id: build
      run: bash .github/scripts/build.sh ${{ inputs.build-config }}

    - name: Setup Playwright
      if: always()
      run: pwsh Sample.Test/bin/${{ inputs.build-config }}/net10.0/playwright.ps1 install --with-deps ${{ matrix.browser }}

    - name: Test
      if: always()
      run: |
        dotnet test -c:${{ inputs.build-config }} -f:net10.0 --no-build --filter TestCategory!~sample --logger:html \
        --logger:"trx;LogFileName=TestResults/TestResults.trx" --collect:"XPlat Code Coverage" --settings ci-${{ matrix.browser }}.runsettings
      
    - name: Convert js coverage results
      run: |
        git restore MRoessler.BlazorBottomSheet
        nyc report --reporter=cobertura --report-dir js-coverage-report
      if: always() && inputs.build-config == 'Debug'

    - name: Collect build results
      id: collect-build-results
      if: always()
      run: bash .github/scripts/collect-build-results.sh ${{ github.server_url }} ${{ github.repository }} ${{ github.ref_name }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: _blazor-bottomsheet-${{ inputs.build-config }}-test-results-${{ matrix.browser }}
        path: |
          **/TestResults/*.html
          Sample.Test/**/Screenshots/*.png
          **/TestResults/*/coverage.cobertura.xml
          js-coverage-report/cobertura-coverage.xml


  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
     
      - name: Configure Git
        run: bash .github/scripts/configure-git.sh

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "*/*.csproj"

      - name: Restore tools
        run: dotnet tool restore

      - name: Download test results (Chromium)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: _blazor-bottomsheet-${{ inputs.build-config }}-test-results-chromium
          path: TestResults/chromium

      - name: Download test results (Webkit)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: _blazor-bottomsheet-${{ inputs.build-config }}-test-results-webkit
          path: TestResults/webkit

      - name: Download test results (Firefox)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: _blazor-bottomsheet-${{ inputs.build-config }}-test-results-firefox
          path: TestResults/firefox

      - name: Generate coverage report
        if: inputs.build-config == 'Debug'
        run: dotnet reportgenerator
      
      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blazor-bottomsheet-${{ inputs.build-config }}-test-report
          path: TestResults

      # push badges to tag without attaching the commit to a branch (for readme.md)
      - name: Commit badges
        if: github.ref_name == 'main' && inputs.build-config == 'Debug'
        run: |
          mkdir badges
          mv TestResults/coverage-report/badge_linecoverage.svg badges
          bash .github/scripts/export-lines-of-code-badge.sh
          git add badges/*
          git commit -m "updated badges"
          git tag build-results 
          git push --force origin build-results

      - name: Publish coverage results
        if: inputs.build-config == 'Debug'
        run: | 
          echo "## Coverage Results" >> $GITHUB_STEP_SUMMARY
          cat TestResults/coverage-report/SummaryGithub.md | sed -e 's/# Summary//g' >> $GITHUB_STEP_SUMMARY


